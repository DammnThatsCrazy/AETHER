# =============================================================================
# Aether DATA INGESTION LAYER — Docker Compose
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Aether Ingestion Server
  # ---------------------------------------------------------------------------
  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=debug
      - REDIS_URL=redis://redis:6379
      - KAFKA_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_EVENTS_TOPIC=aether.events.raw
      - CLICKHOUSE_ENABLED=true
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - S3_ENABLED=false
      - REDIS_ENABLED=true
      - RATE_LIMIT_ENABLED=true
      - CORS_ORIGINS=*
      - ENRICH_GEO=true
      - ENRICH_UA=true
      - ANONYMIZE_IP=true
    volumes:
      - ../packages:/app/packages
      - ../services:/app/services
      - ../tsconfig.json:/app/tsconfig.json
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aether

  # ---------------------------------------------------------------------------
  # Redis — Caching, deduplication, real-time counters
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aether

  # ---------------------------------------------------------------------------
  # Zookeeper — Required for Kafka
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - aether

  # ---------------------------------------------------------------------------
  # Kafka — Event streaming
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'kafka:29092']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - aether

  # ---------------------------------------------------------------------------
  # ClickHouse — Analytics database
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      CLICKHOUSE_DB: aether
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aether

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  clickhouse_data:
  clickhouse_logs:

# =============================================================================
# Networks
# =============================================================================
networks:
  aether:
    driver: bridge
