global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "aether-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/v1/metrics"

  - job_name: "aether-ml-serving"
    static_configs:
      - targets: ["ml-serving:8080"]
    metrics_path: "/metrics"
