groups:
  - name: aether_service_health
    rules:
      - alert: AetherBackendDown
        expr: up{job="aether-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Aether backend is down"
          description: "Backend has been unreachable for 2+ minutes."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate (>5%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 2s"
          description: "p95 latency is {{ $value }}s."

      - alert: RateLimitSpike
        expr: rate(http_rate_limited[5m]) > 10
        for: 3m
        labels:
          severity: info
        annotations:
          summary: "High rate limiting activity"
          description: "{{ $value }} requests/sec being rate limited."

  - name: aether_data_health
    rules:
      - alert: LakeIngestionFailure
        expr: rate(lake_bronze_ingested[10m]) == 0 and rate(lake_ingest_api[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Lake ingestion receiving requests but not persisting"
          description: "Ingest API is called but Bronze records are not being created."

      - alert: LakeRollbackSpike
        expr: rate(lake_bronze_rollback[5m]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Lake rollback detected"
          description: "A source_tag rollback is in progress."

      - alert: ProviderFailureSpike
        expr: rate(provider_request{status="error"}[5m]) / rate(provider_request[5m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Provider {{ $labels.provider }} error rate >30%"
          description: "{{ $labels.provider }} is failing at {{ $value | humanizePercentage }}."

  - name: aether_intelligence_health
    rules:
      - alert: ExpectationContradictionSpike
        expr: rate(expectation_contradictions_detected[5m]) > 5
        for: 3m
        labels:
          severity: info
        annotations:
          summary: "High contradiction detection rate"
          description: "{{ $value }} contradictions/sec detected."

      - alert: FraudHeuristicFallback
        expr: rate(rewards_fraud_heuristic_fallback[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rewards using heuristic fallback in {{ $labels.env }}"
          description: "ML serving unavailable — fraud scoring using rule-based heuristics."

      - alert: ExtractionDefenseBlocked
        expr: rate(extraction_defense_blocked[5m]) > 1
        for: 3m
        labels:
          severity: info
        annotations:
          summary: "Extraction defense blocking requests"
          description: "{{ $value }} requests/sec blocked by ML extraction defense."

  # ============================================================
  # Aether Rate Limiting & Quota Alerts (self-serve plans P1-P4)
  # ============================================================
  - name: aether_rate_limiting
    rules:
      # --- Quota alerts ---
      - alert: TenantQuota80Percent
        expr: aether_quota_utilization_ratio > 0.8
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} at {{ $value | humanizePercentage }} of monthly quota"
          description: "Plan {{ $labels.plan_tier }} tenant approaching quota limit."

      - alert: TenantQuotaExhausted
        expr: aether_quota_remaining_gauge == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} ({{ $labels.plan_tier }}) entered overage billing"
          description: "All subsequent requests will be metered at per-service overage rates."

      - alert: TenantOverageSpike
        expr: rate(aether_overage_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} overage rate >100 req/5min on {{ $labels.service }}"
          description: "High overage consumption may indicate misconfigured integration or need for plan upgrade."

      # --- Burst RPM alerts ---
      - alert: BurstRateLimitHigh
        expr: rate(aether_burst_rpm_rejected_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} hitting burst RPM limit frequently"
          description: "{{ $labels.plan_tier }} plan burst limit being hit. May need plan upgrade or client-side throttling."

      # --- Feature gate alerts ---
      - alert: FeatureGateBlocksHigh
        expr: rate(aether_feature_gate_blocked_total[5m]) > 50
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} repeatedly blocked on {{ $labels.service }}"
          description: "Possible upsell signal — tenant is calling services outside their plan."

      # --- System health ---
      - alert: RateLimitRedisFallbackActive
        expr: rate(aether_redis_fallback_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Rate limiting Redis fallback active on {{ $labels.layer }}"
          description: "Rate limiting enforcement is degraded. Burst RPM and quota metering may not be functioning."

      - alert: RateLimitMiddlewareLatencyHigh
        expr: histogram_quantile(0.99, rate(aether_middleware_latency_seconds_bucket[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting middleware p99 latency >50ms on {{ $labels.layer }}"
          description: "Middleware overhead is too high. Check Redis connectivity and load."
