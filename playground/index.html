<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether SDK Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
    h1 span { color: #6C63FF; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
    .card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 12px; padding: 1.5rem; }
    .card h2 { font-size: 1rem; color: #6C63FF; margin-bottom: 1rem; }
    .card pre { background: #0a0a1a; border-radius: 8px; padding: 1rem; font-size: 0.8rem; overflow-x: auto; color: #a0a0c0; line-height: 1.5; max-height: 300px; overflow-y: auto; }
    button { background: #6C63FF; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin: 0.25rem; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button.secondary { background: #1e1e3a; color: #a0a0c0; }
    .actions { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    #status { color: #4ade80; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1><span>Aether</span> SDK Playground</h1>
  <p class="subtitle">v4.0.0 &mdash; Interactive SDK testing environment</p>

  <div class="actions">
    <button onclick="initSDK()">Init SDK</button>
    <button onclick="trackEvent()">Track Event</button>
    <button onclick="trackPageView()">Page View</button>
    <button onclick="trackConversion()">Conversion</button>
    <button onclick="identifyUser()">Identify User</button>
    <button class="secondary" onclick="showIdentity()">Get Identity</button>
    <button class="secondary" onclick="resetSDK()">Reset</button>
  </div>
  <p id="status"></p>

  <div class="grid">
    <div class="card">
      <h2>Event Log</h2>
      <pre id="log">Waiting for SDK init...</pre>
    </div>
    <div class="card">
      <h2>Identity</h2>
      <pre id="identity">-</pre>
    </div>
    <div class="card">
      <h2>Consent State</h2>
      <pre id="consent">-</pre>
    </div>
  </div>

  <script type="module">
    import aether from '@aether/web';

    window.aether = aether;
    const log = [];

    function appendLog(msg) {
      log.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
      if (log.length > 50) log.shift();
      document.getElementById('log').textContent = log.join('\n');
    }

    function updateUI() {
      const identity = aether.getIdentity();
      document.getElementById('identity').textContent = identity
        ? JSON.stringify(identity, null, 2)
        : 'Not initialized';
      const consent = aether.consent.getState();
      document.getElementById('consent').textContent = JSON.stringify(consent, null, 2);
    }

    window.initSDK = () => {
      try {
        aether.init({
          apiKey: 'playground_demo_key',
          debug: true,
          endpoint: 'https://localhost:9999',
          modules: {
            autoDiscovery: true,
            performanceTracking: true,
            errorTracking: true,
            experiments: true,
            intentPrediction: true,
          },
          privacy: { maskSensitiveFields: true },
        });
        document.getElementById('status').textContent = 'SDK initialized';
        appendLog('SDK initialized');
        updateUI();
      } catch (e) {
        appendLog('Init error: ' + e.message);
      }
    };

    window.trackEvent = () => {
      aether.track('button_click', { label: 'demo', value: Math.random() });
      appendLog('Tracked: button_click');
    };

    window.trackPageView = () => {
      aether.pageView('/playground', { section: 'demo' });
      appendLog('Tracked: pageView /playground');
    };

    window.trackConversion = () => {
      aether.conversion('purchase', 49.99, { product: 'Pro Plan' });
      appendLog('Tracked: conversion $49.99');
    };

    window.identifyUser = () => {
      aether.hydrateIdentity({
        userId: 'user_123',
        traits: { name: 'Demo User', email: 'demo@aether.dev', plan: 'pro' },
      });
      appendLog('Identified: user_123');
      updateUI();
    };

    window.showIdentity = () => {
      updateUI();
      appendLog('Identity refreshed');
    };

    window.resetSDK = () => {
      aether.reset();
      appendLog('SDK reset');
      updateUI();
    };
  </script>
</body>
</html>
